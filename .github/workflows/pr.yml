name: PR Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper lintian

      - name: Verify package structure
        run: |
          echo "=== Package Directory Structure ==="
          ls -la ybarojs-debian/
          echo ""
          echo "=== debian/ Directory ==="
          ls -la ybarojs-debian/debian/
          echo ""
          echo "=== Control File ==="
          cat ybarojs-debian/debian/control
          echo ""
          echo "=== Changelog ==="
          cat ybarojs-debian/debian/changelog

      - name: Build Debian package
        run: |
          dpkg-deb --build ybarojs-debian/

      - name: Verify build output
        run: |
          echo "=== Build Output ==="
          ls -la *.deb
          echo ""
          echo "=== Package Info ==="
          dpkg-deb --info *.deb
          echo ""
          echo "=== Package Contents ==="
          dpkg-deb --contents *.deb

      - name: Run lintian check
        run: |
          lintian *.deb || true
        continue-on-error: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ybarojs-debian-pr${{ github.event.number }}
          path: "*.deb"
          retention-days: 7
